##############################################################################
# GitHub Actions CI – local_stackmathgame
#
# Matrix:
#   Moodle: MOODLE_405_STABLE, MOODLE_500_STABLE, MOODLE_501_STABLE
#   PHP:    8.2, 8.3, 8.4  (8.4 nur für Moodle ≥ 5.1, siehe exclude)
#   DB:     MariaDB 10.11  |  PostgreSQL 16
#
# Abhängigkeiten (immer):
#   qtype_stack                → branch master
#   qbehaviour_stackmathgame   → branch main
#   qbehaviour_adaptivemultipart → branch master
#
# Optionale Integrationen (phpunit-with-integrations):
#   block_xp                   → branch master (FMCorz/moodle-block_xp)
#   block_stash                → branch master (FMCorz/moodle-block_stash)
#   Testet silent-fail NICHT aktiv, sondern event-firing WITH plugins present.
##############################################################################

name: Moodle Plugin CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  MOODLE_CI: '^4'

jobs:

  # ── 1a. PHP Lint ──────────────────────────────────────────────────────────
  lint-php:
    name: "PHP Lint – ${{ matrix.php }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: PHP CodeSniffer (Moodle coding style)
        run: moodle-plugin-ci phpcs plugin

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd plugin || true

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd plugin || true

  # ── 1b. JS / CSS Lint ────────────────────────────────────────────────────
  lint-js:
    name: "JS/CSS Lint"
    runs-on: ubuntu-24.04

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          ini-values: max_input_vars=5000
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install required locale
        run: |
          sudo locale-gen en_AU.UTF-8
          sudo update-locale

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima {v}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Set TRAVIS_BRANCH for moodle-plugin-ci
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="default-branch"
          fi
          echo "TRAVIS_BRANCH=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Register qbehaviour_stackmathgame
        run: moodle-plugin-ci add-plugin --branch main ralferlebach/moodle-qbehaviour_stackmathgame

      - name: Register qbehaviour_adaptivemultipart
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qbehaviour_adaptivemultipart

      - name: Install Moodle (grunt-Config)
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  mariadb \
            --db-host  127.0.0.1 \
            --db-port  3306 \
            --db-user  root \
            --db-pass  root \
            --db-name  moodle \
            --branch   MOODLE_405_STABLE

      - name: Install Node dependencies
        run: npm install
        working-directory: ${{ github.workspace }}/moodle

      - name: Fix .git pack permissions for grunt backup/restore
        run: chmod -R u+w plugin/.git/ 2>/dev/null || true

      - name: ESLint – AMD JS
        run: moodle-plugin-ci grunt -m "$GITHUB_WORKSPACE/moodle" -t eslint

      - name: Stylelint – CSS
        run: moodle-plugin-ci grunt -m "$GITHUB_WORKSPACE/moodle" -t stylelint
        continue-on-error: true

      - name: Verify AMD build artefacts
        run: |
          MISSING=0
          for src in plugin/amd/src/*.js; do
            [ -f "$src" ] || continue
            base=$(basename "$src" .js)
            [ -f "plugin/amd/build/${base}.min.js" ] || {
              echo "MISSING: amd/build/${base}.min.js"
              MISSING=$((MISSING+1))
            }
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING AMD build file(s) fehlen – 'grunt amd' ausführen."
            exit 1
          fi
          echo "AMD build OK: $(ls plugin/amd/src/*.js | wc -l) Datei(en) verifiziert."

  # ── 2a. PHPUnit – ohne optionale Integrationen ────────────────────────────
  # Testet den Normalbetrieb: block_xp und block_stash sind NICHT installiert.
  # Alle Bridge-Tests müssen dabei silent-fail zeigen (markTestSkipped oder
  # available=false / dispatched=false).
  phpunit:
    name: "PHPUnit – ohne Integrationen (${{ matrix.moodle }} / PHP ${{ matrix.php }} / ${{ matrix.db.engine }})"
    runs-on: ubuntu-24.04
    needs: [lint-php, lint-js]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_405_STABLE', 'MOODLE_500_STABLE', 'MOODLE_501_STABLE']
        php:    ['8.2', '8.3', '8.4']
        db:
          - { engine: mariadb, type: mariadb, port: 3306, user: root,   pass: root   }
          - { engine: pgsql,   type: pgsql,   port: 5432, user: moodle, pass: moodle }
        exclude:
          - { moodle: MOODLE_405_STABLE, php: '8.4' }
          - { moodle: MOODLE_500_STABLE, php: '8.4' }

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      pgsql:
        image: postgres:16
        env:
          POSTGRES_USER:     moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB:       postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U moodle"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, pdo_pgsql, gd, xml, zip, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install required locale
        run: |
          sudo locale-gen en_AU.UTF-8
          sudo update-locale

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima {v}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Set TRAVIS_BRANCH for moodle-plugin-ci
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="default-branch"
          fi
          echo "TRAVIS_BRANCH=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Register qbehaviour_stackmathgame
        run: moodle-plugin-ci add-plugin --branch main ralferlebach/moodle-qbehaviour_stackmathgame

      - name: Register qbehaviour_adaptivemultipart
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qbehaviour_adaptivemultipart

      # block_xp und block_stash werden NICHT registriert – das ist der Sinn dieses Jobs.

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  ${{ matrix.db.type }} \
            --db-host  127.0.0.1 \
            --db-port  ${{ matrix.db.port }} \
            --db-user  ${{ matrix.db.user }} \
            --db-pass  ${{ matrix.db.pass }} \
            --db-name  moodle \
            --branch   ${{ matrix.moodle }}

      - name: PHPUnit – alle Tests (ohne block_xp / block_stash)
        run: moodle-plugin-ci phpunit

  # ── 2b. PHPUnit – MIT block_xp + block_stash ─────────────────────────────
  # Schlanker Job (nur Moodle 4.5 + PHP 8.2 + MariaDB) der prüft, ob die
  # Bridges korrekt feuern wenn die optionalen Plugins tatsächlich installiert
  # sind. Testet insbesondere:
  #   • availability::has_block_xp() / has_block_stash() → true
  #   • xp_bridge::dispatch() feuert progress_updated + question_solved Events
  #   • question_solved feuert NICHT bei solved=false
  #   • stash_bridge::dispatch() feuert bei solved=true (lokale Inventartabelle)
  phpunit-with-integrations:
    name: "PHPUnit – MIT block_xp + block_stash (MOODLE_405_STABLE / PHP 8.2 / MariaDB)"
    runs-on: ubuntu-24.04
    needs: [lint-php, lint-js]

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install required locale
        run: |
          sudo locale-gen en_AU.UTF-8
          sudo update-locale

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima {v}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Set TRAVIS_BRANCH for moodle-plugin-ci
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="default-branch"
          fi
          echo "TRAVIS_BRANCH=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Register qbehaviour_stackmathgame
        run: moodle-plugin-ci add-plugin --branch main ralferlebach/moodle-qbehaviour_stackmathgame

      - name: Register qbehaviour_adaptivemultipart
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qbehaviour_adaptivemultipart

      # Optionale Integrationen – NUR in diesem Job
      - name: Register block_xp (optional integration)
        run: moodle-plugin-ci add-plugin --branch master FMCorz/moodle-block_xp

      - name: Register block_stash (optional integration)
        run: moodle-plugin-ci add-plugin --branch master FMCorz/moodle-block_stash

      - name: Install Moodle MOODLE_405_STABLE
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  mariadb \
            --db-host  127.0.0.1 \
            --db-port  3306 \
            --db-user  root \
            --db-pass  root \
            --db-name  moodle \
            --branch   MOODLE_405_STABLE

      - name: PHPUnit – Bridge-Tests MIT block_xp + block_stash
        run: moodle-plugin-ci phpunit

  # ── 3. Behat ──────────────────────────────────────────────────────────────
  behat:
    name: "Behat (${{ matrix.moodle }} / PHP 8.2 / Chrome)"
    runs-on: ubuntu-24.04
    needs: [phpunit, phpunit-with-integrations]
    strategy:
      fail-fast: false
      matrix:
        moodle: ['MOODLE_405_STABLE', 'MOODLE_500_STABLE', 'MOODLE_501_STABLE']

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, gd, xml, zip, intl
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install required locale
        run: |
          sudo locale-gen en_AU.UTF-8
          sudo update-locale

      - name: Install Maxima (≥ 5.46) and gnuplot
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y maxima gnuplot
          VER=$(maxima --version 2>&1 | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          echo "Installed Maxima $VER"
          python3 -c "
          v = tuple(int(x) for x in '${VER}'.split('.'))
          assert v >= (5, 46), f'Maxima {v} < required (5, 46)'
          print(f'Maxima {v}: OK')
          "

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev moodlehq/moodle-plugin-ci ci ${{ env.MOODLE_CI }}
          echo "$GITHUB_WORKSPACE/ci/bin"        >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> "$GITHUB_PATH"

      - name: Set TRAVIS_BRANCH for moodle-plugin-ci
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="default-branch"
          fi
          echo "TRAVIS_BRANCH=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Register qtype_stack
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qtype_stack

      - name: Register qbehaviour_stackmathgame
        run: moodle-plugin-ci add-plugin --branch main ralferlebach/moodle-qbehaviour_stackmathgame

      - name: Register qbehaviour_adaptivemultipart
        run: moodle-plugin-ci add-plugin --branch master maths/moodle-qbehaviour_adaptivemultipart

      - name: Install Moodle ${{ matrix.moodle }}
        run: |
          moodle-plugin-ci install \
            --plugin   ./plugin \
            --db-type  mariadb \
            --db-host  127.0.0.1 \
            --db-port  3306 \
            --db-user  root \
            --db-pass  root \
            --db-name  moodle \
            --branch   ${{ matrix.moodle }}

      - name: Behat – all plugin scenarios
        run: |
          moodle-plugin-ci behat \
            --profile chrome \
            --tags='@local_stackmathgame&&~@broken'

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots-${{ matrix.moodle }}
          path: ${{ github.workspace }}/moodle/behatfaildumps/
          retention-days: 7
